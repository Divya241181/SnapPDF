[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Omit public frontend variables from Netlify's secret scanner
  # These are intended to be included in the client-side bundle (Vite)
  SECRETS_SCAN_OMIT_KEYS = "VITE_API_URL,VITE_GOOGLE_CLIENT_ID,VITE_EMAILJS_SERVICE_ID,VITE_EMAILJS_TEMPLATE_ID,VITE_EMAILJS_PUBLIC_KEY"



[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200